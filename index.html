<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ Dish Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Dish Finder</h1>
        <p>Enter the ingredients you have, and we'll find dishes you can make!</p>
        
        <form id="searchForm">
            <textarea 
                id="ingredients" 
                placeholder="Enter ingredients (comma-separated)&#10;Example: chicken, garlic, soy sauce"
                rows="4"
                required
            ></textarea>
            <button type="submit">Find Dishes</button>
        </form>
        
        <div id="results"></div>
    </div>
    
    <!-- Recipe Modal -->
    <div id="recipeModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="recipeDetail"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
